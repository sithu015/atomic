name: Cloud image

# Builds and pushes the Atomic Cloud pod image (cloud.dockerfile) to GHCR.
# amd64-only: the deploy target is a single x86 droplet (DEPLOY.md §5/§7).
# workflow_dispatch allows building from a branch (e.g. the initial deploy);
# pushes to main rebuild when anything the image bakes changes.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'cloud.dockerfile'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/**'
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'vite.config.ts'
      - 'package.json'
      - 'package-lock.json'

concurrency:
  group: cloud-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/atomic-cloud
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: cloud.dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_SHA=${{ github.sha }}
          cache-from: type=gha,scope=atomic-cloud
          cache-to: type=gha,mode=max,scope=atomic-cloud
